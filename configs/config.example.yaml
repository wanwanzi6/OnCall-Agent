server:
  port: 8080

app:
  env: dev

mock:
  enabled: true

knowledge:
  upload_dir: data/uploads
  max_file_size_bytes: 2097152
  allowed_exts:
    - .md
    - .markdown
    - .txt

aiops:
  mode: rule
  fallback_to_rule: true
  alert_provider: mock
  log_provider: mock
  metric_provider: mock
  agent:
    max_steps: 12
    timeout: 60s
  timeout: 10s
  sop_top_k: 3

llm:
  provider: mock
  api_key: ${LLM_API_KEY}
  base_url: ${LLM_BASE_URL}
  model: ${LLM_MODEL}
  timeout: 30s

rag:
  chunk_size: 800
  chunk_overlap: 100
  embedding_dim: 64
  default_top_k: 3
  embedder_provider: mock
  vector_store_provider: memory

embedding:
  dashscope:
    api_key: ${DASHSCOPE_API_KEY}
    model: text-embedding-v4
    dimensions: 1024
    timeout: 30s

milvus:
  address: localhost:19530
  database: agent
  collection: oncall_knowledge
  vector_field: vector
  timeout: 10s

prometheus:
  base_url: http://localhost:9090
  timeout: 5s
